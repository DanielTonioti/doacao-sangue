<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Dados para Doação de Sangue</h1>
    </header>
    <main>
        <form action="" id="DoacaoSangue">
            <!-- Nome do usuario -->
            <div>
                <label for="Nome">Nome: </label><br>
                    <input type="text" name="Nome" id="Nome" placeholder="Ex.: Joao Silva da Costa" title="Coloque seu nome completo" minlength="3">
            </div>
            <!-- Email do usuario -->
            <div>
                <label for="Email">E-mail: </label><br>
                    <input type="email" name="Email" id="Email" placeholder="Ex.: Joao_silva@gmail.com" title="Coloque seu e-mail">
            </div>
            <!-- Idade do Usuario -->
            <div>
                <label for="Idade">Idade: </label><br>
                    <input type="date" name="Idade" id="Idade" placeholder="19/02/1880">
            </div>
            <!-- Peso do Usuario -->
            <div>
                <label for="Peso">Peso: </label><br>
                    <input type="number" name="Peso" id="Peso" placeholder="Ex.:80 kg" title="Insira apenas a quantidade em kg" min="0">
            </div>
            <!-- Tipo Sanguineo do Usuario -->
            <div>
                <label for="TipoSanguineo">Tipo Sanguineo: </label><br>
                <select id="TipoSanguineo">
                    <option value="" disabled selected required>Selecione uma das opções</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>
            <!-- Telefone do usuario -->
            <div>
                <label for="TelefoneUsuario">Telefone: </label><br>
                        <input type="tel" id="TelefoneUsuario" placeholder="xx9xxxxxxxx"
                         minlength= "8" maxlength="11" title="Tem que ser no seguinte formato: xx9xxxxxxxx" class="InputsN" required>
            </div>
            <!-- Cidade do Usuario -->
            <div>
                <label for="CidadeUsuario">Qual a sua cidade?</label><br>
                        <input type="text" id="CidadeUsuario" placeholder="Cidade" title="Coloque na seguinte formatação: Cidade" class="InputsN" required>
            </div>
            <!-- Estado do Usuario -->
             <div>
                <label for="Estado">Qual seu estado?</label><br>
                    <input type="text" id="Estado" placeholder="Estado" title="Coloque na seguinte formatação: Cidade" class="InputsN" required>
             </div>
             <button type="submit" id="submit">subiti</button>
            <script src="scripts/script.js"></script>
        </form>
    </main>
    <footer>
        <p>Todos os direitos reservados a Daniel Tonioti</p>
    </footer>
</body>
</html>
